<!DOCTYPE html>

<html>

<head>
	<link rel="stylesheet" href="styles.css">
</head>

<body>
	<!-- the entire body must be written by student -->
	<div class="container">
        <h1>Tic Tac Toe</h1>

        <div id="setup-screen">
            <div class="input-group">
                <label for="player-1">Player 1</label>
                <input type="text" id="player-1" placeholder="Enter name" required>
            </div>
            <div class="input-group">
                <label for="player-2">Player 2</label>
                <input type="text" id="player-2" placeholder="Enter name" required>
            </div>
            <button id="submit">Start Game</button>
        </div>

        <div id="game-screen" class="hide">
            <div class="message"></div>
            
            <div class="board">
                <div class="cell" id="1"></div>
                <div class="cell" id="2"></div>
                <div class="cell" id="3"></div>
                <div class="cell" id="4"></div>
                <div class="cell" id="5"></div>
                <div class="cell" id="6"></div>
                <div class="cell" id="7"></div>
                <div class="cell" id="8"></div>
                <div class="cell" id="9"></div>
            </div>
        </div>
    </div>
    <script type="text/javascript" src="./script.js">
</script>

</body>

</html>
